<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socials — Mason Gross</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a0a;
            --surface:   #141414;
            --surface2:  #1e1e1e;
            --border:    #2a2a2a;
            --accent:    #e8ff00;
            --accent2:   #ff6b00;
            --text:      #f0f0f0;
            --muted:     #666;
            --radius:    10px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            padding: 48px 40px 32px;
            border-bottom: 1px solid var(--border);
        }

        .header-label {
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 6px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(56px, 8vw, 96px);
            line-height: 0.9;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #fff 40%, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── NAV ── */
        nav {
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            overflow-x: auto;
        }

        nav a {
            display: inline-block;
            padding: 14px 20px;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
        }

        nav a:hover { color: var(--text); border-bottom-color: var(--accent); }
        nav a.active { color: var(--text); border-bottom-color: var(--accent); }

        /* ── INTRO ── */
        .intro {
            padding: 48px 40px 36px;
            border-bottom: 1px solid var(--border);
        }

        .intro p {
            font-size: 15px;
            color: var(--muted);
            max-width: 480px;
            line-height: 1.7;
        }

        /* ── SOCIAL LINKS ── */
        .social-grid {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .social-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
            animation: fadeUp 0.3s ease both;
        }

        .social-card:hover {
            transform: translateY(-3px);
            border-color: #444;
        }

        .social-card:hover .social-arrow { transform: translate(3px, -3px); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .social-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-instagram { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }
        .icon-youtube   { background: #ff0000; }
        .icon-tiktok    { background: #000; border: 1px solid #333; }

        .social-icon svg { width: 24px; height: 24px; fill: #fff; }

        .social-info { flex: 1; }

        .social-platform {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .social-handle {
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
        }

        .social-arrow {
            color: var(--muted);
            font-size: 20px;
            transition: transform 0.2s;
        }

        @media (max-width: 600px) {
            header, nav, .intro, .social-grid { padding-left: 20px; padding-right: 20px; }
            .social-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
