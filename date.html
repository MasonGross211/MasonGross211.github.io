<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Night</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0a08;
  --surface: #161210;
  --card: #1d1814;
  --border: rgba(255,220,150,0.08);
  --border-hover: rgba(255,220,150,0.18);
  --gold: #d4a84b;
  --gold-soft: rgba(212,168,75,0.15);
  --gold-line: rgba(212,168,75,0.3);
  --text: #f2e8d8;
  --muted: #7a6e5e;
  --soft: #a89880;
  --done: rgba(212,168,75,0.6);
}

body {
  font-family: 'Jost', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.hero {
  text-align: center;
  padding: 56px 24px 40px;
  position: relative;
}

.date-title-wrap {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}

.date-title-input {
  background: none;
  border: none;
  outline: none;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 42px;
  font-style: italic;
  font-weight: 300;
  color: var(--text);
  text-align: center;
  width: 320px;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s;
  padding-bottom: 2px;
}

.date-title-input:focus { border-color: var(--gold-line); }
.date-title-input::placeholder { color: var(--muted); }

.ornament { color: var(--gold); opacity: 0.5; font-size: 22px; user-select: none; }

.hero-meta {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-top: 4px;
}

.date-input {
  background: none;
  border: none;
  outline: none;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s;
}

.date-input::-webkit-calendar-picker-indicator { filter: invert(0.4); cursor: pointer; }
.date-input:hover { color: var(--soft); }

.sep { color: var(--muted); opacity: 0.3; }

.hero-rule {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--gold-line), transparent);
  margin: 28px auto 0;
}

/* ── TIMELINE ── */
.timeline {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 24px 32px;
  position: relative;
}

.timeline::before {
  content: '';
  position: absolute;
  left: calc(24px + 54px);
  top: 0;
  bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom, var(--gold-line) 0%, var(--gold-line) 90%, transparent 100%);
}

.stop {
  display: flex;
  gap: 0;
  position: relative;
  margin-bottom: 6px;
  animation: appear 0.35s ease;
}

@keyframes appear {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.stop-time-col {
  width: 54px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding-right: 0;
  padding-top: 18px;
}

.stop-time {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--gold);
  line-height: 1;
  white-space: nowrap;
}

.stop-dot-col {
  width: 32px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 18px;
}

.stop-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--gold);
  border: 2px solid var(--bg);
  box-shadow: 0 0 0 1px var(--gold-line);
  flex-shrink: 0;
  transition: transform 0.2s;
  margin-top: 3px;
}

.stop.done .stop-dot { background: var(--muted); box-shadow: 0 0 0 1px var(--muted); }

.stop-card {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 16px 14px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  min-width: 0;
  margin-left: 0;
}

.stop-card:hover { border-color: var(--border-hover); background: #221c16; }

.stop.done .stop-card { opacity: 0.45; }

.stop-card-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  justify-content: space-between;
}

.stop-icon {
  font-size: 15px;
  line-height: 1.4;
  flex-shrink: 0;
}

.stop-name {
  flex: 1;
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.25;
  transition: color 0.2s;
}

.stop.done .stop-name { text-decoration: line-through; color: var(--muted); }

.stop-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s;
  flex-shrink: 0;
}

.stop-card:hover .stop-actions { opacity: 1; }

.act-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 15px;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
  line-height: 1;
}

.act-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.act-btn.del:hover { color: #c06060; }

.stop-desc {
  font-size: 13px;
  color: var(--soft);
  margin-top: 6px;
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  line-height: 1.5;
}

.stop-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
}

.stop-duration {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.stop-duration::before {
  content: '◷';
  font-size: 12px;
  color: var(--gold);
  opacity: 0.5;
}

/* ── ADD FORM ── */
.add-section {
  max-width: 560px;
  margin: 12px auto 0;
  padding: 0 24px;
}

.add-toggle {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  border-radius: 12px;
  padding: 14px;
  color: var(--muted);
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.add-toggle:hover { border-color: var(--gold-line); color: var(--gold); }

.add-form {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  display: none;
}

.add-form.open { display: block; animation: appear 0.25s ease; }

.form-row { display: flex; gap: 8px; margin-bottom: 10px; }
.form-row:last-child { margin-bottom: 0; }

.fi {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 13px;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  min-width: 0;
}

.fi::placeholder { color: var(--muted); }
.fi:focus { border-color: var(--gold-line); }

.fi.name-fi { font-size: 14px; font-weight: 500; }

select.fi { cursor: pointer; appearance: none; }
input[type="time"].fi { cursor: pointer; }

.btn-submit {
  background: var(--gold);
  color: #1a1410;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
}

.btn-submit:hover { background: #e0b85a; }
.btn-submit:active { transform: scale(0.97); }

.btn-cancel {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

.btn-cancel:hover { border-color: var(--border-hover); color: var(--soft); }

/* ── BOTTOM SUMMARY ── */
.summary {
  max-width: 560px;
  margin: 32px auto 0;
  padding: 0 24px 60px;
  display: flex;
  justify-content: center;
  gap: 40px;
}

.sum-item { text-align: center; }

.sum-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  font-weight: 300;
  color: var(--gold);
  line-height: 1;
}

.sum-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 4px;
}

/* empty */
.empty-line {
  max-width: 560px;
  margin: 0 auto;
  padding: 32px 24px;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="hero">
  <div class="date-title-wrap">
    <span class="ornament">✦</span>
    <input class="date-title-input" id="title" type="text" placeholder="Our Date Night" maxlength="40" />
    <span class="ornament">✦</span>
  </div>
  <div class="hero-meta">
    <input class="date-input" id="datepick" type="date" />
    <span class="sep">|</span>
    <span style="font-size:13px;font-weight:300;letter-spacing:.07em;color:var(--muted)" id="dur-label">— hrs total</span>
  </div>
  <div class="hero-rule"></div>
</div>

<div class="timeline" id="timeline">
  <div class="empty-line" id="empty-msg">Your evening is a blank canvas — add the first stop below.</div>
</div>

<div class="add-section">
  <button class="add-toggle" id="add-toggle" onclick="toggleForm()">+ Add a stop to the evening</button>
  <div class="add-form" id="add-form">
    <div class="form-row">
      <input class="fi name-fi" id="f-name" placeholder="What are you doing? (e.g. Dinner at Lucia's)" onkeydown="if(event.key==='Enter')submitStop()" />
    </div>
    <div class="form-row">
      <input class="fi" type="time" id="f-time" />
      <input class="fi" type="number" id="f-dur" placeholder="Duration (mins)" min="5" max="360" style="max-width:160px" />
      <select class="fi" id="f-cat" style="max-width:150px">
        <option value="food">🍽 Dinner</option>
        <option value="drinks">🍷 Drinks</option>
        <option value="walk">🌙 Walk</option>
        <option value="show">🎭 Show / Event</option>
        <option value="activity">✨ Activity</option>
        <option value="cozy">🕯 Cozy time</option>
        <option value="travel">🚗 Travel</option>
        <option value="surprise">🎁 Surprise</option>
      </select>
    </div>
    <div class="form-row">
      <input class="fi" id="f-note" placeholder="A little note… (optional)" onkeydown="if(event.key==='Enter')submitStop()" />
    </div>
    <div class="form-row">
      <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
      <button class="btn-submit" onclick="submitStop()">Add to itinerary →</button>
    </div>
  </div>
</div>

<div class="summary" id="summary" style="display:none">
  <div class="sum-item"><div class="sum-num" id="s-stops">0</div><div class="sum-label">stops</div></div>
  <div class="sum-item"><div class="sum-num" id="s-hrs">0</div><div class="sum-label">hours</div></div>
  <div class="sum-item"><div class="sum-num" id="s-done">0</div><div class="sum-label">done</div></div>
</div>

<script>
const CAT = {
  food:     { emoji:'🍽', bg:'rgba(192,90,90,.15)',   color:'#c08888', label:'Dinner' },
  drinks:   { emoji:'🍷', bg:'rgba(160,90,140,.15)',  color:'#b888a8', label:'Drinks' },
  walk:     { emoji:'🌙', bg:'rgba(90,120,170,.15)',  color:'#88a8c8', label:'Walk' },
  show:     { emoji:'🎭', bg:'rgba(90,143,192,.15)',  color:'#7aace0', label:'Show' },
  activity: { emoji:'✨', bg:'rgba(212,168,75,.15)',  color:'#d4a84b', label:'Activity' },
  cozy:     { emoji:'🕯', bg:'rgba(155,126,200,.15)', color:'#9b7ec8', label:'Cozy' },
  travel:   { emoji:'🚗', bg:'rgba(90,160,120,.15)',  color:'#7ab898', label:'Travel' },
  surprise: { emoji:'🎁', bg:'rgba(200,130,90,.15)',  color:'#c89868', label:'Surprise' },
};

let stops = [
  { id: 1, name: "Going to Capital City Mall",     time: '10:00', duration: 52,  cat: 'travel',   note: 'Driving to Capital City Mall',  done: false },
  { id: 2, name: "Stopping in Capital City Mall",  time: '11:10', duration: 60,  cat: 'activity', note: 'Go shopping',                    done: false },
  { id: 3, name: "Surprise",                       time: '12:10', duration: 20,  cat: 'surprise', note: '',                               done: false },
  { id: 4, name: "Finish shopping Capital City Mall", time: '13:11', duration: 60, cat: 'activity', note: '',                             done: false },
  { id: 5, name: "Get food",                       time: '14:11', duration: 60,  cat: 'food',     note: '',                               done: false },
  { id: 6, name: "Go to Dave & Buster's",          time: '15:11', duration: 180, cat: 'activity', note: '',                               done: false },
  { id: 7, name: "Going back to your house",       time: '18:11', duration: 52,  cat: 'travel',   note: '',                               done: false },
];
let nextId = 8;

render();

function toggleForm() {
  const f = document.getElementById('add-form');
  const t = document.getElementById('add-toggle');
  const isOpen = f.classList.contains('open');
  f.classList.toggle('open');
  t.style.display = isOpen ? '' : 'none';
  if (!isOpen) {
    // default time = last stop end or now
    const last = stops.length ? stops[stops.length - 1] : null;
    let defTime = '';
    if (last && last.time && last.duration) {
      const [h, m] = last.time.split(':').map(Number);
      const end = h * 60 + m + last.duration;
      defTime = `${String(Math.floor(end/60) % 24).padStart(2,'0')}:${String(end%60).padStart(2,'0')}`;
    } else {
      const now = new Date();
      defTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    }
    document.getElementById('f-time').value = defTime;
    document.getElementById('f-name').focus();
  }
}

function submitStop() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const time = document.getElementById('f-time').value;
  const dur  = parseInt(document.getElementById('f-dur').value) || null;
  const cat  = document.getElementById('f-cat').value;
  const note = document.getElementById('f-note').value.trim();
  stops.push({ id: nextId++, name, time, duration: dur, cat, note, done: false });
  stops.sort((a, b) => {
    if (!a.time) return 1; if (!b.time) return -1;
    return a.time.localeCompare(b.time);
  });
  document.getElementById('f-name').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-dur').value = '';
  const form = document.getElementById('add-form');
  form.classList.remove('open');
  document.getElementById('add-toggle').style.display = '';
  render();
}

function toggleDone(id) {
  const s = stops.find(s => s.id === id);
  if (s) { s.done = !s.done; render(); }
}

function removeStop(id) {
  stops = stops.filter(s => s.id !== id);
  render();
}

function fmtTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'pm' : 'am';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
}

function fmtDur(mins) {
  if (!mins) return null;
  if (mins < 60) return `${mins} min`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h}h ${m}m` : `${h} hr${h>1?'s':''}`;
}

function render() {
  const tl = document.getElementById('timeline');
  const empty = document.getElementById('empty-msg');

  if (stops.length === 0) {
    tl.innerHTML = '';
    tl.appendChild(empty);
    document.getElementById('summary').style.display = 'none';
    updateDurLabel();
    return;
  }

  tl.innerHTML = '';
  stops.forEach((s, i) => {
    const cm = CAT[s.cat] || CAT.activity;
    const div = document.createElement('div');
    div.className = 'stop' + (s.done ? ' done' : '');

    let endNote = '';
    if (s.time && s.duration) {
      const [h,m] = s.time.split(':').map(Number);
      const end = h*60 + m + s.duration;
      endNote = `until ${fmtTime(`${String(Math.floor(end/60)%24).padStart(2,'0')}:${String(end%60).padStart(2,'0')}`)}`;
    }

    div.innerHTML = `
      <div class="stop-time-col">
        <span class="stop-time">${fmtTime(s.time)}</span>
      </div>
      <div class="stop-dot-col"><div class="stop-dot"></div></div>
      <div class="stop-card" onclick="toggleDone(${s.id})">
        <div class="stop-card-top">
          <span class="stop-icon">${cm.emoji}</span>
          <span class="stop-name">${s.name}</span>
          <div class="stop-actions" onclick="event.stopPropagation()">
            <button class="act-btn del" onclick="removeStop(${s.id})" title="Remove">×</button>
          </div>
        </div>
        ${s.note ? `<div class="stop-desc">${s.note}</div>` : ''}
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:${s.note?'8px':'8px'}">
          <span class="stop-tag" style="background:${cm.bg};color:${cm.color}">${cm.label}</span>
          ${fmtDur(s.duration) ? `<span class="stop-duration">${fmtDur(s.duration)}${endNote ? ' · ' + endNote : ''}</span>` : ''}
        </div>
      </div>
    `;
    tl.appendChild(div);
  });

  const doneCount = stops.filter(s => s.done).length;
  const totalMins = stops.reduce((a, s) => a + (s.duration || 0), 0);
  const hrs = totalMins ? (totalMins / 60).toFixed(1) : '—';

  document.getElementById('s-stops').textContent = stops.length;
  document.getElementById('s-hrs').textContent = hrs;
  document.getElementById('s-done').textContent = doneCount;
  document.getElementById('summary').style.display = 'flex';
  updateDurLabel(totalMins);
}

function updateDurLabel(mins) {
  const el = document.getElementById('dur-label');
  if (!mins || stops.length === 0) { el.textContent = '— hrs total'; return; }
  const h = Math.floor(mins/60), m = mins%60;
  el.textContent = (m ? `${h}h ${m}m` : `${h} hrs`) + ' total';
}

// set today as default date
document.getElementById('datepick').value = '2026-05-02';
document.getElementById('title').value = 'Our Date Night';
</script>
</body>
</html>
