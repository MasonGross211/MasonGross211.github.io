<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery — Mason Gross</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a0a;
            --surface:   #141414;
            --surface2:  #1e1e1e;
            --border:    #2a2a2a;
            --accent:    #e8ff00;
            --accent2:   #ff6b00;
            --text:      #f0f0f0;
            --muted:     #666;
            --radius:    10px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            padding: 48px 40px 32px;
            border-bottom: 1px solid var(--border);
        }

        .header-label {
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 6px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(56px, 8vw, 96px);
            line-height: 0.9;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #fff 40%, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── NAV ── */
        nav {
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            overflow-x: auto;
        }

        nav a {
            display: inline-block;
            padding: 14px 20px;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
        }

        nav a:hover { color: var(--text); border-bottom-color: var(--accent); }
        nav a.active { color: var(--text); border-bottom-color: var(--accent); }

        /* ── FILTERS ── */
        .filters {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .filter-row {
            padding: 16px 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
        }

        .filter-row:last-child { border-bottom: none; }

        .filter-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            min-width: 64px;
            flex-shrink: 0;
        }

        .pill-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .pill {
            padding: 6px 14px;
            border-radius: 99px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.18s;
            white-space: nowrap;
        }

        .pill:hover { border-color: #555; color: var(--text); }
        .pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }
        .pill.active.athlete { background: #7c3aed; border-color: #7c3aed; color: #fff; }

        /* ── SORT + STATS ROW ── */
        .meta-bar {
            padding: 12px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            gap: 24px;
            font-size: 12px;
            color: var(--muted);
        }

        .stats span { color: var(--text); font-weight: 500; }

        .sort-select {
            padding: 6px 12px;
            border-radius: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            cursor: pointer;
        }

        /* ── VIDEO GRID ── */
        #videoList {
            padding: 36px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .video-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            animation: fadeUp 0.25s ease both;
        }

        .video-card:hover { transform: translateY(-3px); border-color: #444; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 16:9 embed wrapper */
        .video-embed {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }

        .video-embed iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-embed .no-video {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--surface2);
            color: var(--muted);
            font-size: 12px;
        }

        .no-video svg { opacity: 0.25; }

        /* ── CARD META ── */
        .video-meta {
            padding: 14px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .tag-dot { width: 6px; height: 6px; border-radius: 50%; }

        .tag-lj { background: rgba(232,255,0,0.08); color: var(--accent); border-color: rgba(232,255,0,0.2); }
        .tag-lj .tag-dot { background: var(--accent); }
        .tag-tj { background: rgba(255,107,0,0.08); color: var(--accent2); border-color: rgba(255,107,0,0.2); }
        .tag-tj .tag-dot { background: var(--accent2); }
        .tag-athlete { background: rgba(124,58,237,0.1); color: #a78bfa; border-color: rgba(124,58,237,0.25); }
        .tag-comp { background: rgba(255,255,255,0.05); color: var(--muted); border-color: var(--border); }

        .card-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: var(--border);
            line-height: 1;
            flex-shrink: 0;
        }

        .card-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .card-date {
            font-size: 12px;
            color: var(--muted);
        }

        .card-distance {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: var(--text);
            letter-spacing: 0.03em;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }

        .empty-state h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 40px;
            color: var(--surface2);
            margin-bottom: 8px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            header, nav, .filter-row, .meta-bar, #videoList {
                padding-left: 20px;
                padding-right: 20px;
            }
            #videoList { grid-template-columns: 1fr; }
        }
    </style>
</head>

// ── STATE ──────────────────────────────────────────
let activeType    = "All";
let activeDate    = "All";
let activeAthlete = "All";
let sortOrder     = "newest";

// ── BUILD ATHLETE PILLS DYNAMICALLY ───────────────
function buildAthleteFilters() {
    const names = [...new Set(videos.map(v => v.athlete).filter(Boolean))].sort();
    const group = document.getElementById("athleteFilters");
    names.forEach(name => {
        const btn = document.createElement("button");
        btn.className = "pill";
        btn.dataset.athlete = name;
        btn.textContent = name;
        group.appendChild(btn);
    });
}

// ── HELPERS ───────────────────────────────────────
function formatDate(d) {
    const [y, m, day] = d.split("-");
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[+m-1]} ${+day}, ${y}`;
}

function cleanId(id) {
    // strip ?feature=share or any query string
    return id ? id.split("?")[0] : "";
}

// ── UPDATE DATE PILLS based on current type + athlete ─
function updateDatePills() {
    // which dates have videos matching the current type & athlete filters?
    const validDates = new Set(
        videos
            .filter(v =>
                (activeType    === "All" || v.type    === activeType) &&
                (activeAthlete === "All" || v.athlete === activeAthlete)
            )
            .map(v => v.date)
    );

    document.querySelectorAll("#dateFilters .pill").forEach(btn => {
        const d = btn.dataset.date;
        if (d === "All") return; // always show All
        const hide = !validDates.has(d);
        btn.style.display = hide ? "none" : "";
        // if currently selected date is now hidden, reset to All
        if (hide && activeDate === d) {
            activeDate = "All";
            document.querySelectorAll("#dateFilters .pill").forEach(p => p.classList.remove("active"));
            document.querySelector("#dateFilters .pill[data-date='All']").classList.add("active");
        }
    });
}

// ── RENDER ────────────────────────────────────────
function render() {
    const list = document.getElementById("videoList");
    list.innerHTML = "";

    updateDatePills();

    let filtered = videos.filter(v =>
        (activeType    === "All" || v.type    === activeType) &&
        (activeDate    === "All" || v.date    === activeDate) &&
        (activeAthlete === "All" || v.athlete === activeAthlete)
    );

    filtered.sort((a, b) => sortOrder === "newest"
        ? new Date(b.date) - new Date(a.date)
        : new Date(a.date) - new Date(b.date)
    );

    document.getElementById("countShown").textContent = filtered.length;
    document.getElementById("countLJ").textContent = filtered.filter(v => v.type === "Long Jump").length;
    document.getElementById("countTJ").textContent = filtered.filter(v => v.type === "Triple Jump").length;

    if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><h3>No Videos Found</h3><p>Try adjusting the filters above.</p></div>`;
        return;
    }

    filtered.forEach((v, i) => {
        const isLJ  = v.type === "Long Jump";
        const id    = cleanId(v.youtubeId);
        const card  = document.createElement("div");
        card.className = "video-card";
        card.style.animationDelay = `${Math.min(i, 8) * 0.04}s`;

        const embedHtml = id
            ? `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen loading="lazy"></iframe>`
            : `<div class="no-video">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <span>Coming soon</span>
               </div>`;

        const typeTag = isLJ
            ? `<span class="tag tag-lj"><span class="tag-dot"></span>Long Jump</span>`
            : `<span class="tag tag-tj"><span class="tag-dot"></span>Triple Jump</span>`;

        const athleteTag = v.athlete
            ? `<span class="tag tag-athlete">${v.athlete}</span>` : "";

        const compTag = v.competition
            ? `<span class="tag tag-comp">${v.competition}</span>` : "";

        card.innerHTML = `
            <div class="video-embed">${embedHtml}</div>
            <div class="video-meta">
                <div class="card-top">
                    <div class="card-tags">${typeTag}${athleteTag}${compTag}</div>
                    <div class="card-num">${String(i + 1).padStart(2, "0")}</div>
                </div>
                <div class="card-bottom">
                    <div class="card-date">${formatDate(v.date)}</div>
                    ${v.distance ? `<div class="card-distance">${v.distance}</div>` : ""}
                </div>
            </div>`;

        list.appendChild(card);
    });
}

// ── FILTER CLICKS ─────────────────────────────────
function bindPills(containerId, stateKey) {
    document.getElementById(containerId).addEventListener("click", e => {
        const btn = e.target.closest(".pill");
        if (!btn) return;
        document.querySelectorAll(`#${containerId} .pill`).forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        if (stateKey === "type")    activeType    = btn.dataset.type;
        if (stateKey === "date")    activeDate    = btn.dataset.date;
        if (stateKey === "athlete") activeAthlete = btn.dataset.athlete;
        render();
    });
}

bindPills("typeFilters",    "type");
bindPills("dateFilters",    "date");
bindPills("athleteFilters", "athlete");

document.getElementById("sortOrder").addEventListener("change", e => {
    sortOrder = e.target.value;
    render();
});

// ── INIT ──────────────────────────────────────────
buildAthleteFilters();
render();
</script>
